<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harcama Takibi - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">← Sohbete Dön</a>
      <div class="navbar-nav mx-auto">
        <span class="navbar-text fw-bold">Dashboard Kontrol Merkezi</span>
      </div>
    </div>
  </nav>

  <div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="mb-0">Finansal Özet</h4>
      <div>
        <button class="btn btn-primary fw-bold me-2" data-bs-toggle="modal" data-bs-target="#manualAddModal">➕ Manuel İşlem Ekle</button>
        <button class="btn btn-outline-success fw-bold me-2" onclick="downloadReport('weekly')">📅 Haftalık Excel Raporu</button>
        <button class="btn btn-outline-success fw-bold" onclick="downloadReport('monthly')">📆 Aylık Excel Raporu</button>
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-md-4">
        <div class="card text-white bg-success">
          <div class="card-body">
            <h5 class="card-title">Toplam Gelir</h5>
            <h3><span id="total-income">0</span> TL</h3>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-white bg-danger">
          <div class="card-body">
            <h5 class="card-title">Toplam Gider</h5>
            <h3><span id="total-expense">0</span> TL</h3>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-white bg-info">
          <div class="card-body">
            <h5 class="card-title">Kalan Bütçe</h5>
            <h3><span id="net-balance">0</span> TL</h3>
          </div>
        </div>
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-md-6">
        <h5>Kategori Dağılımı</h5>
        <canvas id="categoryChart"></canvas>
      </div>
      <div class="col-md-6">
        <h5>Aylık Harcama Eğrisi</h5>
        <canvas id="trendChart"></canvas>
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-12">
        <h5>🔁 Düzenli İşlemler (Aylık/Haftalık)</h5>
        <div id="recurring-list" class="list-group"></div>
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-12">
        <h5>📊 Bütçe Limitleri</h5>
        <div id="budget-status-list" class="list-group"></div>
      </div>
    </div>

    <div class="row">
      <div class="col-12">
        <h5>İşlemler</h5>
        <table class="table table-striped">
          <thead>
            <tr>
              <th>Tarih</th>
              <th>Tür</th>
              <th>Kategori</th>
              <th>Tutar</th>
              <th>Açıklama</th>
              <th>Düzenle</th>
            </tr>
          </thead>
          <tbody id="transactions-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal fade" id="manualAddModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Manuel İşlem Ekle</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="manualAddForm">
            <div class="mb-3">
              <label class="form-label">İşlem Türü</label>
              <select class="form-select" id="manual-type" required>
                <option value="expense">Gider</option>
                <option value="income">Gelir</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Kategori</label>
              <input type="text" class="form-control" id="manual-category" placeholder="Örn: Market, Kira, Fatura" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Tutar (TL)</label>
              <input type="number" class="form-control" id="manual-amount" required min="0" step="0.01">
            </div>
            <div class="mb-3">
              <label class="form-label">Tarih</label>
              <input type="date" class="form-control" id="manual-date" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Açıklama</label>
              <input type="text" class="form-control" id="manual-description">
            </div>
            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="manual-recurring">
              <label class="form-check-label">Bu düzenli bir işlemdir (Her Ay Tekrarlar)</label>
            </div>
            <button type="submit" class="btn btn-primary w-100">İşlemi Kaydet</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.service.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
