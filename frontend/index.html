<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harcama Takibi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column" style="height: 100vh;">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Harcama Takibi</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="dashboard.html">Dashboard</a>
      </div>
    </div>
  </nav>

  <!-- Chat Container -->
  <div class="flex-grow-1 overflow-auto p-3" id="chat-messages">
    <!-- Messages will be appended here by chat.js -->
  </div>

  <!-- Input Area -->
  <div class="position-fixed bottom-0 w-100 bg-white p-3 border-top">
    <div class="container-fluid">
      <div class="input-group">
        <input type="text" class="form-control" id="user-input" placeholder="Mesajınızı yazın..." aria-label="Mesaj">
        <button class="btn btn-primary" type="button" id="send-btn">Gönder</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.service.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
