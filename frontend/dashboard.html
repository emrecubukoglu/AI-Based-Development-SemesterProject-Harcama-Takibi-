<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harcama Takibi - Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">← Sohbete Dön</a>
      <div class="navbar-nav mx-auto">
        <span class="navbar-text">Dashboard</span>
      </div>
    </div>
  </nav>

  <div class="container-fluid mt-4">
    <div class="row mb-4">
      <div class="col-md-4">
        <div class="card text-white bg-success">
          <div class="card-body">
            <h5 class="card-title">Toplam Gelir</h5>
            <h3><span id="total-income">0</span> TL</h3>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-white bg-danger">
          <div class="card-body">
            <h5 class="card-title">Toplam Gider</h5>
            <h3><span id="total-expense">0</span> TL</h3>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-white bg-info">
          <div class="card-body">
            <h5 class="card-title">Kalan Bütçe</h5>
            <h3><span id="net-balance">0</span> TL</h3>
          </div>
        </div>
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-md-6">
        <h5>Kategori Dağılımı</h5>
        <canvas id="categoryChart"></canvas>
      </div>
      <div class="col-md-6">
        <h5>Aylık Harcama Eğrisi</h5>
        <canvas id="trendChart"></canvas>
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-12">
        <h5>🔁 Düzenli İşlemler (Aylık/Haftalık)</h5>
        <div id="recurring-list" class="list-group">
          </div>
      </div>
    </div>
    
    <div class="row mb-4">
      <div class="col-12">
        <h5>📊 Bütçe Limitleri</h5>
        <div id="budget-status-list" class="list-group">
          </div>
      </div>
    </div>

    <div class="row">
      <div class="col-12">
        <h5>İşlemler</h5>
        <table class="table table-striped">
          <thead>
            <tr>
              <th>Tarih</th>
              <th>Tür</th>
              <th>Kategori</th>
              <th>Tutar</th>
              <th>Açıklama</th>
              <th>Düzenle</th>
            </tr>
          </thead>
          <tbody id="transactions-tbody">
            </tbody>
        </table>
      </div>
    </div>

    <div id="budget-alert" class="alert alert-danger d-none">
      Bütçe aşımı uyarısı!
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.service.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
